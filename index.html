<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess PWA with Chessboard.js & Stockfish</title>
  
  <link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon">
  <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">

  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #1e1e1e;
      color: #eee;
      margin: 0;
      padding: 0.5rem;
    }
    .container {
      max-width: 620px;
      width: 100%;
    }
    .controls, .toggles {
      display: flex;
      gap: 8px;
      margin-bottom: 0.5rem;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }
    select, button, label {
      padding: 6px 10px;
      font-size: 0.85rem;
      border-radius: 4px;
      border: 1px solid #444;
      background: #2b2b2b;
      color: #fff;
    }
    button { cursor: pointer; background: #3b82f6; border: none; }
    button:hover { filter: brightness(1.1); }
    button:disabled { background: #555; opacity: 0.6; cursor: not-allowed; filter: none; }
    .btn-secondary { background: #6b7280; }
    .btn-analyze { background: #8b5cf6; }

    .game-area {
      display: flex;
      gap: 8px;
      width: 100%;
      position: relative;
    }
    
    .eval-container {
      width: 26px;
      background: #333;
      border-radius: 4px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      border: 1px solid #555;
      position: relative;
    }
    .eval-white {
      background: #f0f0f0;
      width: 100%;
      height: 50%;
      transition: height 0.4s ease;
    }
    .eval-text {
      position: absolute;
      width: 100%;
      text-align: center;
      font-size: 0.6rem;
      font-weight: bold;
      color: #888;
      bottom: 2px;
      z-index: 2;
      text-shadow: 0 0 2px rgba(0,0,0,0.8);
    }

    .board-wrapper {
      flex: 1;
      aspect-ratio: 1 / 1;
    }

    #board { width: 100%; }

    #status {
      margin-top: 0.5rem;
      font-weight: bold;
      text-align: center;
      font-size: 0.9rem;
      min-height: 1.4em;
    }

    #review-mode-banner {
      display: none;
      background: #f59e0b;
      color: #000;
      font-weight: bold;
      text-align: center;
      padding: 4px;
      margin-top: 4px;
      border-radius: 4px;
      font-size: 0.8rem;
    }

    #analysis-panel {
      margin-top: 0.75rem;
      background: #2b2b2b;
      padding: 0.75rem;
      border-radius: 8px;
      display: none;
      border: 1px solid #3a3a3a;
    }

    .summary-card {
      background: #1e1e1e;
      padding: 12px 14px;
      border-radius: 8px;
      margin-bottom: 10px;
      border: 1px solid #333;
    }
    .summary-title {
      font-size: 0.95rem;
      margin-bottom: 6px;
    }
    .accuracy-big {
      font-size: 1.8rem;
      font-weight: 900;
      color: #8b5cf6;
    }
    .summary-stats {
      display: flex;
      justify-content: flex-start;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 8px;
      font-size: 0.72rem;
    }
    .player-accuracy {
      display: flex;
      gap: 16px;
      margin-top: 8px;
      font-size: 0.82rem;
    }
    .player-accuracy span {
      padding: 2px 8px;
      border-radius: 4px;
      background: #2a2a2a;
    }

    #analysis-list {
      max-height: 260px;
      overflow-y: auto;
      margin-top: 6px;
    }
    #analysis-list::-webkit-scrollbar { width: 6px; }
    #analysis-list::-webkit-scrollbar-track { background: #1e1e1e; border-radius: 3px; }
    #analysis-list::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }

    .analysis-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 8px;
      border-bottom: 1px solid #2a2a2a;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.15s;
      font-size: 0.82rem;
    }
    .analysis-row:hover { background: #383838; }
    .analysis-row.active-review {
      background: #1e3a8a !important;
      border-left: 4px solid #3b82f6;
    }
    .analysis-row .move-info {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .analysis-row .move-num {
      color: #888;
      font-size: 0.72rem;
      min-width: 28px;
    }
    .analysis-row .move-san {
      font-weight: 600;
    }
    .analysis-row .eval-delta {
      font-size: 0.68rem;
      color: #999;
      margin-left: 4px;
    }

    .badge {
      padding: 2px 7px;
      border-radius: 3px;
      font-weight: bold;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }
    .badge-book { background: #a78bfa; color: #fff; }
    .badge-best { background: #10b981; color: #fff; }
    .badge-excellent { background: #34d399; color: #064e3b; }
    .badge-good { background: #3b82f6; color: #fff; }
    .badge-inaccuracy { background: #f59e0b; color: #000; }
    .badge-mistake { background: #f97316; color: #fff; }
    .badge-miss { background: #dc2626; color: #fff; }
    .badge-blunder { background: #991b1b; color: #fff; }

    .loading-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      z-index: 100;
      font-size: 0.9rem;
    }
    .spinner {
      width: 24px; height: 24px;
      border: 3px solid #555;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .nav-buttons {
      display: flex;
      gap: 4px;
      margin-top: 6px;
      justify-content: center;
    }
    .nav-buttons button {
      padding: 4px 12px;
      font-size: 0.8rem;
    }
  </style>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
</head>
<body>

  <div class="container">
    <div class="controls">
      <div>
        <label for="game-mode">Mode:</label>
        <select id="game-mode">
          <option value="ai" selected>Player vs Stockfish</option>
          <option value="local">Local 2-Player (Flip Turn)</option>
        </select>
      </div>

      <div id="ai-difficulty-wrapper">
        <label for="difficulty">Difficulty:</label>
        <select id="difficulty">
          <option value="0">Beginner</option>
          <option value="3">Casual</option>
          <option value="8">Intermediate</option>
          <option value="14">Advanced</option>
          <option value="20" selected>Master</option>
        </select>
      </div>

      <button id="reset-btn">New Game</button>
    </div>

    <div class="toggles">
      <label><input type="checkbox" id="toggle-eval" checked> Eval Bar</label>
      <button id="analyze-btn" class="btn-analyze">⚡ Analyze Game</button>
      <button id="current-pos-btn" class="btn-secondary" disabled>↩ Current Position</button>
    </div>

    <div id="review-mode-banner">📋 Review Mode — Click moves or use ← → keys</div>

    <div class="game-area">
      <div class="eval-container" id="eval-container">
        <div class="eval-white" id="eval-white"></div>
        <div class="eval-text" id="eval-text">0.0</div>
      </div>
      
      <div class="board-wrapper" style="position:relative;">
        <div id="board"></div>
        <div class="loading-overlay" id="engine-loading">
          <div class="spinner"></div>
          <span>Loading Stockfish...</span>
        </div>
      </div>
    </div>

    <div id="status">Initializing...</div>

    <div class="nav-buttons" id="nav-buttons" style="display:none;">
      <button id="nav-start" class="btn-secondary">⏮</button>
      <button id="nav-prev" class="btn-secondary">◀</button>
      <button id="nav-next" class="btn-secondary">▶</button>
      <button id="nav-end" class="btn-secondary">⏭</button>
    </div>

    <div id="analysis-panel">
      <div class="summary-card">
        <div class="summary-title"><strong>Game Analysis</strong></div>
        <div style="display:flex; align-items:baseline; gap:12px;">
          <span class="accuracy-big" id="accuracy-score">—</span>
          <span style="font-size:0.8rem; color:#aaa;">Overall Accuracy</span>
        </div>
        <div class="player-accuracy" id="player-accuracy"></div>
        <div class="summary-stats" id="summary-stats"></div>
      </div>
      <strong style="font-size:0.85rem;">Move-by-Move Review:</strong>
      <div id="analysis-list"></div>
    </div>
  </div>

  <script>
    // ===== GLOBALS =====
    let board = null;
    const game = new Chess();
    let engineWorker = null;
    let isThinking = false;
    let evaluatingLive = false;
    let engineReady = false;
    let isAnalyzing = false;
    let isReviewing = false;
    let currentDepth = 0;
    let moveHistoryFens = [];
    let reviewIndex = -1;
    let analysisResults = [];

    // ===== CHESS.COM-STYLE EXPECTED POINTS MODEL =====
    // Converts centipawn evaluation to Expected Points (win probability 0..1)
    // Based on the standard sigmoid win-probability formula used by chess.com
    function expectedPoints(cp) {
      if (cp >= 9000) return 1.0;   // Forced mate for side with advantage
      if (cp <= -9000) return 0.0;  // Forced mate against
      return 1.0 / (1.0 + Math.pow(10, -cp / 400.0));
    }

    // Move accuracy (0-100) from expected points loss — non-linear like chess.com
    function calcMoveAccuracy(epBefore, epAfter) {
      var epLoss = Math.max(0, epBefore - epAfter);
      var lossPct = epLoss * 100;
      var acc = 103.1668 * Math.exp(-0.04354 * lossPct) - 3.1669;
      return Math.max(0, Math.min(100, acc));
    }

    // Classification using Chess.com's Expected Points thresholds:
    // Best: 0.00 | Excellent: 0-0.02 | Good: 0.02-0.05 |
    // Inaccuracy: 0.05-0.10 | Mistake: 0.10-0.20 | Blunder: 0.20+
    function classifyMove(epBefore, epAfter, moveIndex, isBook) {
      if (isBook) return { category: 'Book', badgeClass: 'badge-book' };
      var epLoss = Math.max(0, epBefore - epAfter);
      if (epLoss <= 0.002) return { category: 'Best', badgeClass: 'badge-best' };
      if (epLoss <= 0.02)  return { category: 'Excellent', badgeClass: 'badge-excellent' };
      if (epLoss <= 0.05)  return { category: 'Good', badgeClass: 'badge-good' };
      if (epLoss <= 0.10)  return { category: 'Inaccuracy', badgeClass: 'badge-inaccuracy' };
      if (epLoss <= 0.20)  return { category: 'Mistake', badgeClass: 'badge-mistake' };
      return { category: 'Blunder', badgeClass: 'badge-blunder' };
    }

    // Simple opening book detection for first ~10 plies
    var BOOK_MOVES = ['e4','d4','Nf3','c4','e5','c5','Nc6','Nf6','d5','e6',
      'd6','g6','Bb5','Ba4','Bc4','Nc3','Nbd7','Be7','O-O','d3','c3',
      'Re1','h3','a3','b3','Bb2','Qe2','Rd1','exd5','cxd5','Nxd5','dxe5',
      'Nxe4','Be2','Bd3','Nge2','f4','Nc6','a6','b5','Bb7','Qc7'];
    function isBookMove(san, moveIndex) {
      if (moveIndex >= 10) return false;
      var clean = san.replace(/[+#!?]/g, '');
      return BOOK_MOVES.indexOf(clean) !== -1;
    }

    // ===== BOARD ORIENTATION =====
    function updateBoardOrientation() {
      if (!board) return;
      var isLocal = $('#game-mode').val() === 'local';
      if (isLocal && game.turn() === 'b' && !isReviewing) {
        board.orientation('black');
      } else if (!isReviewing) {
        board.orientation('white');
      }
    }

    // ===== CHESSBOARD.JS HANDLERS =====
    function onDragStart(source, piece, position, orientation) {
      if (game.game_over() || isReviewing || isThinking || isAnalyzing || !engineReady) return false;
      var isLocal = $('#game-mode').val() === 'local';
      if (!isLocal) {
        if (piece.search(/^b/) !== -1) return false;
      }
      if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
          (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
        return false;
      }
    }

    function onDrop(source, target) {
      var move = game.move({ from: source, to: target, promotion: 'q' });
      if (move === null) return 'snapback';
      updateStatus();
      var isLocal = $('#game-mode').val() === 'local';
      if (!isLocal && !game.game_over()) {
        triggerEngineMove();
      }
    }

    function onSnapEnd() {
      board.position(game.fen());
    }

    // ===== BOARD INIT =====
    function initBoard() {
      var config = {
        draggable: true,
        position: 'start',
        onDragStart: onDragStart,
        onDrop: onDrop,
        onSnapEnd: onSnapEnd,
        pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
      };
      board = Chessboard('board', config);
      $(window).resize(function() { board.resize(); });
    }

    // ===== STATUS =====
    function updateStatus() {
      var status = '';
      var moveColor = game.turn() === 'b' ? 'Black' : 'White';
      var isLocal = $('#game-mode').val() === 'local';

      updateBoardOrientation();

      if (isReviewing) {
        $('#review-mode-banner').show();
        $('#nav-buttons').show();
        $('#status').text('Reviewing position ' + reviewIndex + ' / ' + (moveHistoryFens.length - 1));
        return;
      }

      $('#review-mode-banner').hide();
      $('#nav-buttons').hide();

      if (game.in_checkmate()) {
        status = 'Game over — ' + moveColor + ' is checkmated.';
      } else if (game.in_draw()) {
        status = 'Game over — Draw.';
      } else if (game.in_stalemate()) {
        status = 'Game over — Stalemate.';
      } else if (isThinking) {
        var depthText = currentDepth > 0 ? ' (depth ' + currentDepth + ')' : '';
        status = 'Stockfish thinking' + depthText + '...';
      } else {
        if (isLocal) {
          status = moveColor + " to move.";
        } else {
          status = game.turn() === 'w' ? 'Your turn (White)' : "Stockfish's turn (Black)";
        }
        if (game.in_check()) status += ' — Check!';
      }

      $('#status').text(status);
      if (!isThinking && !isAnalyzing) requestLiveEval();
    }

    // ===== ENGINE INTEGRATION =====
    function initEngine() {
      try {
        // CDN-hosted Stockfish.js — works as a Web Worker without local files
        var STOCKFISH_URL = 'https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js';
        engineWorker = new Worker(STOCKFISH_URL);

        engineWorker.onmessage = function(e) {
          var line = (typeof e.data === 'string') ? e.data : '';
          if (!line) return;

          if (line === 'uciok') {
            engineReady = true;
            $('#engine-loading').fadeOut(300);
            engineWorker.postMessage('isready');
            return;
          }

          if (line === 'readyok') {
            engineReady = true;
            $('#engine-loading').fadeOut(300);
            updateStatus();
            return;
          }

          // Parse depth from info lines
          if (line.indexOf('info depth ') !== -1) {
            var m = line.match(/info depth (\d+)/);
            if (m) {
              currentDepth = parseInt(m[1], 10);
              if (isThinking) {
                $('#status').text('Stockfish thinking (depth ' + currentDepth + ')...');
              }
            }
          }

          // Parse evaluation for live eval bar
          if (line.indexOf('score cp') !== -1 || line.indexOf('score mate') !== -1) {
            parseEvalLine(line);
          }

          // Handle bestmove response
          if (line.indexOf('bestmove') === 0) {
            if (evaluatingLive) {
              evaluatingLive = false;
              return;
            }
            if (isThinking && !isAnalyzing && !isReviewing) {
              var parts = line.split(' ');
              var moveStr = parts[1];
              if (moveStr && moveStr !== '(none)') {
                game.move({
                  from: moveStr.substring(0, 2),
                  to: moveStr.substring(2, 4),
                  promotion: moveStr.length > 4 ? moveStr[4] : 'q'
                });
                board.position(game.fen());
              }
              isThinking = false;
              currentDepth = 0;
              updateStatus();
            }
          }
        };

        engineWorker.onerror = function(err) {
          console.error('Stockfish worker error:', err);
          $('#engine-loading').html('<span style="color:#ef4444;">Engine failed to load.<br>Please refresh the page.</span>');
        };

        engineWorker.postMessage('uci');
        engineWorker.postMessage('setoption name Skill Level value 20');
        engineWorker.postMessage('isready');

      } catch (err) {
        console.error('Engine init failed:', err);
        $('#engine-loading').html('<span style="color:#ef4444;">Failed to start engine.</span>');
        $('#status').text('Engine initialization failed.');
      }
    }

    function triggerEngineMove() {
      if (!engineWorker || !engineReady || isThinking || isAnalyzing) return;
      isThinking = true;
      evaluatingLive = false;
      currentDepth = 0;
      updateStatus();

      engineWorker.postMessage('stop');
      engineWorker.postMessage('position fen ' + game.fen());
      engineWorker.postMessage('go movetime 1500');
    }

    function setDifficulty() {
      if (!engineWorker || !engineReady) return;
      var level = parseInt($('#difficulty').val(), 10);
      engineWorker.postMessage('setoption name Skill Level value ' + level);
    }

    // ===== EVAL BAR =====
    function parseEvalLine(line) {
      if (!$('#toggle-eval').is(':checked') || isAnalyzing || isReviewing) return;
      var tokens = line.split(' ');
      var cpIdx = tokens.indexOf('cp');
      var mateIdx = tokens.indexOf('mate');

      if (cpIdx !== -1) {
        var cp = parseInt(tokens[cpIdx + 1], 10);
        if (game.turn() === 'b') cp = -cp;
        updateEvalBar(cp);
      } else if (mateIdx !== -1) {
        var mate = parseInt(tokens[mateIdx + 1], 10);
        if (game.turn() === 'b') mate = -mate;
        updateEvalBar(0, true, mate);
      }
    }

    function updateEvalBar(scoreCp, isMate, mateIn) {
      isMate = isMate || false;
      mateIn = mateIn || 0;
      var evalDisplay = '';
      var percentage = 50;

      if (isMate) {
        evalDisplay = 'M' + Math.abs(mateIn);
        percentage = mateIn > 0 ? 100 : 0;
      } else {
        var val = (scoreCp / 100).toFixed(1);
        evalDisplay = scoreCp >= 0 ? '+' + val : val;
        // Sigmoid-based bar (matches chess.com feel)
        var ep = expectedPoints(scoreCp);
        percentage = ep * 100;
      }

      percentage = Math.max(2, Math.min(98, percentage));
      $('#eval-white').css('height', percentage + '%');
      $('#eval-text').text(evalDisplay);
    }

    function requestLiveEval() {
      if (!engineWorker || !engineReady || isThinking || isAnalyzing || isReviewing) return;
      if (!$('#toggle-eval').is(':checked')) return;

      evaluatingLive = true;
      engineWorker.postMessage('stop');
      engineWorker.postMessage('position fen ' + game.fen());
      engineWorker.postMessage('go depth 14');
    }

    // ===== GAME ANALYSIS (Chess.com Expected Points Model) =====
    function waitForReady() {
      return new Promise(function(resolve) {
        function handler(e) {
          var line = (typeof e.data === 'string') ? e.data : '';
          if (line === 'readyok') {
            engineWorker.removeEventListener('message', handler);
            resolve();
          }
        }
        engineWorker.addEventListener('message', handler);
        engineWorker.postMessage('isready');
      });
    }

    function evaluatePosition(fen, depth) {
      depth = depth || 12;
      return new Promise(function(resolve) {
        var lastCp = 0;

        function handler(e) {
          var line = (typeof e.data === 'string') ? e.data : '';
          if (!line) return;

          if (line.indexOf('score cp') !== -1) {
            var tokens = line.split(' ');
            var idx = tokens.indexOf('cp');
            if (idx !== -1) lastCp = parseInt(tokens[idx + 1], 10);
          } else if (line.indexOf('score mate') !== -1) {
            var tokens2 = line.split(' ');
            var idx2 = tokens2.indexOf('mate');
            if (idx2 !== -1) {
              var m = parseInt(tokens2[idx2 + 1], 10);
              lastCp = m > 0 ? 10000 : -10000;
            }
          }

          if (line.indexOf('bestmove') === 0) {
            engineWorker.removeEventListener('message', handler);
            resolve(lastCp);
          }
        }

        engineWorker.addEventListener('message', handler);
        engineWorker.postMessage('position fen ' + fen);
        engineWorker.postMessage('go depth ' + depth);
      });
    }

    async function analyzeGame() {
      var history = game.history({ verbose: true });
      if (history.length === 0) {
        alert('Play some moves first before analyzing!');
        return;
      }

      isAnalyzing = true;
      isReviewing = false;
      $('#analyze-btn').prop('disabled', true).text('⏳ Analyzing...');
      $('#analysis-panel').show();
      $('#analysis-list').empty();
      $('#summary-stats').empty();
      $('#player-accuracy').empty();
      $('#accuracy-score').text('...');

      engineWorker.postMessage('stop');
      await waitForReady();

      // Build position history and evaluate each
      var tempGame = new Chess();
      moveHistoryFens = [tempGame.fen()];
      var evaluations = []; // All in White's perspective (centipawns)

      // Evaluate starting position
      var startRaw = await evaluatePosition(tempGame.fen(), 12);
      evaluations.push(startRaw); // White to move, so already White perspective

      for (var i = 0; i < history.length; i++) {
        tempGame.move(history[i]);
        moveHistoryFens.push(tempGame.fen());

        var rawEval = await evaluatePosition(tempGame.fen(), 12);
        // rawEval is from side-to-move's perspective; convert to White's
        var whiteEval;
        if (tempGame.turn() === 'w') {
          whiteEval = rawEval;       // White to move → already White perspective
        } else {
          whiteEval = -rawEval;      // Black to move → negate for White perspective
        }
        evaluations.push(whiteEval);

        var pct = Math.round(((i + 1) / history.length) * 100);
        $('#status').text('Analyzing... ' + pct + '% (' + (i + 1) + '/' + history.length + ')');
        await new Promise(function(r) { setTimeout(r, 10); }); // Let UI breathe
      }

      // Classify moves using Expected Points Model
      analysisResults = [];
      var totalAccWhite = 0, countWhite = 0;
      var totalAccBlack = 0, countBlack = 0;
      var stats = { Book: 0, Best: 0, Excellent: 0, Good: 0, Inaccuracy: 0, Mistake: 0, Blunder: 0 };

      for (var j = 0; j < history.length; j++) {
        var move = history[j];
        var evalBefore = evaluations[j];
        var evalAfter = evaluations[j + 1];

        // Expected Points from the MOVER's perspective
        var epBefore, epAfter;
        if (move.color === 'w') {
          epBefore = expectedPoints(evalBefore);
          epAfter = expectedPoints(evalAfter);
        } else {
          epBefore = 1.0 - expectedPoints(evalBefore);
          epAfter = 1.0 - expectedPoints(evalAfter);
        }

        var book = isBookMove(move.san, j);
        var classification = classifyMove(epBefore, epAfter, j, book);
        var accuracy = calcMoveAccuracy(epBefore, epAfter);
        var epLoss = Math.max(0, epBefore - epAfter);

        stats[classification.category]++;

        if (move.color === 'w') { totalAccWhite += accuracy; countWhite++; }
        else { totalAccBlack += accuracy; countBlack++; }

        analysisResults.push({
          index: j,
          move: move,
          category: classification.category,
          badgeClass: classification.badgeClass,
          accuracy: accuracy,
          epLoss: epLoss,
          evalAfter: evalAfter
        });

        // Build analysis row
        var moveNum = Math.floor(j / 2) + 1;
        var prefix = (j % 2 === 0) ? moveNum + '.' : moveNum + '...';
        var evalStr = (evalAfter >= 0 ? '+' : '') + (evalAfter / 100).toFixed(1);
        var lossStr = epLoss > 0.002 ? ' (−' + (epLoss * 100).toFixed(0) + '%)' : '';

        var rowHtml =
          '<div class="analysis-row" data-index="' + (j + 1) + '">' +
            '<div class="move-info">' +
              '<span class="move-num">' + prefix + '</span>' +
              '<span class="move-san">' + move.san + '</span>' +
              '<span class="eval-delta">' + evalStr + lossStr + '</span>' +
            '</div>' +
            '<span class="badge ' + classification.badgeClass + '">' + classification.category + '</span>' +
          '</div>';
        $('#analysis-list').append(rowHtml);
      }

      // Overall accuracy
      var totalMoves = history.length;
      var overallAcc = Math.round((totalAccWhite + totalAccBlack) / totalMoves);
      var whiteAcc = countWhite > 0 ? Math.round(totalAccWhite / countWhite) : 0;
      var blackAcc = countBlack > 0 ? Math.round(totalAccBlack / countBlack) : 0;

      $('#accuracy-score').text(overallAcc + '%');
      $('#player-accuracy').html(
        '<span>⬜ White: <strong>' + whiteAcc + '%</strong></span>' +
        '<span>⬛ Black: <strong>' + blackAcc + '%</strong></span>'
      );

      // Stats badges
      var statsHtml = '';
      if (stats.Book > 0)      statsHtml += '<span class="badge badge-book">Book: ' + stats.Book + '</span>';
      if (stats.Best > 0)      statsHtml += '<span class="badge badge-best">Best: ' + stats.Best + '</span>';
      if (stats.Excellent > 0) statsHtml += '<span class="badge badge-excellent">Excellent: ' + stats.Excellent + '</span>';
      if (stats.Good > 0)      statsHtml += '<span class="badge badge-good">Good: ' + stats.Good + '</span>';
      if (stats.Inaccuracy > 0) statsHtml += '<span class="badge badge-inaccuracy">Inaccuracy: ' + stats.Inaccuracy + '</span>';
      if (stats.Mistake > 0)   statsHtml += '<span class="badge badge-mistake">Mistake: ' + stats.Mistake + '</span>';
      if (stats.Blunder > 0)   statsHtml += '<span class="badge badge-blunder">Blunder: ' + stats.Blunder + '</span>';
      $('#summary-stats').html(statsHtml);

      isAnalyzing = false;
      $('#analyze-btn').prop('disabled', false).text('⚡ Analyze Game');
      updateStatus();
    }

    // ===== REVIEW NAVIGATION =====
    function goToReviewPosition(idx) {
      if (idx < 0 || idx >= moveHistoryFens.length) return;
      reviewIndex = idx;
      isReviewing = true;
      board.position(moveHistoryFens[idx]);
      $('.analysis-row').removeClass('active-review');
      $('.analysis-row[data-index="' + idx + '"]').addClass('active-review');
      $('#current-pos-btn').prop('disabled', false);
      $('#nav-buttons').show();
      updateStatus();

      // Show eval for this position
      if (idx > 0 && analysisResults[idx - 1]) {
        updateEvalBar(analysisResults[idx - 1].evalAfter);
      } else {
        updateEvalBar(0);
      }
    }

    // ===== EVENT LISTENERS =====
    $('#analyze-btn').on('click', analyzeGame);

    $(document).on('click', '.analysis-row', function() {
      var idx = parseInt($(this).data('index'), 10);
      goToReviewPosition(idx);
    });

    $('#nav-start').on('click', function() { goToReviewPosition(0); });
    $('#nav-prev').on('click', function() { goToReviewPosition(reviewIndex - 1); });
    $('#nav-next').on('click', function() { goToReviewPosition(reviewIndex + 1); });
    $('#nav-end').on('click', function() { goToReviewPosition(moveHistoryFens.length - 1); });

    $('#reset-btn').on('click', function() {
      game.reset();
      board.position('start');
      isThinking = false;
      isAnalyzing = false;
      isReviewing = false;
      evaluatingLive = false;
      currentDepth = 0;
      reviewIndex = -1;
      analysisResults = [];
      moveHistoryFens = [];
      $('#analysis-panel').hide();
      $('#current-pos-btn').prop('disabled', true);
      $('#nav-buttons').hide();
      updateEvalBar(0);
      updateStatus();
    });

    $('#game-mode').on('change', function() {
      var isLocal = $(this).val() === 'local';
      $('#ai-difficulty-wrapper').toggle(!isLocal);
      updateStatus();
    });

    $('#difficulty').on('change', setDifficulty);

    $('#toggle-eval').on('change', function() {
      $('#eval-container').toggle($(this).is(':checked'));
      if ($(this).is(':checked')) requestLiveEval();
    });

    $('#current-pos-btn').on('click', function() {
      isReviewing = false;
      reviewIndex = -1;
      $('#current-pos-btn').prop('disabled', true);
      $('#nav-buttons').hide();
      $('.analysis-row').removeClass('active-review');
      board.position(game.fen());
      updateStatus();
    });

    // Keyboard navigation during review
    $(document).on('keydown', function(e) {
      if (!isReviewing) return;
      if (e.key === 'ArrowLeft')  { e.preventDefault(); goToReviewPosition(reviewIndex - 1); }
      if (e.key === 'ArrowRight') { e.preventDefault(); goToReviewPosition(reviewIndex + 1); }
      if (e.key === 'Home')       { e.preventDefault(); goToReviewPosition(0); }
      if (e.key === 'End')        { e.preventDefault(); goToReviewPosition(moveHistoryFens.length - 1); }
      if (e.key === 'Escape')     { $('#current-pos-btn').click(); }
    });

    // ===== INIT =====
    $(document).ready(function() {
      initBoard();
      initEngine();
    });
  </script>
</body>
</html>
