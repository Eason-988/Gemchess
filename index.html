<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess PWA with Chessboard.js & Stockfish</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon">
  <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">

  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #1e1e1e;
      color: #eee;
      margin: 0;
      padding: 0.5rem;
    }
    .container {
      max-width: 600px;
      width: 100%;
    }
    .controls, .toggles {
      display: flex;
      gap: 8px;
      margin-bottom: 0.5rem;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }
    select, button, label {
      padding: 6px 10px;
      font-size: 0.85rem;
      border-radius: 4px;
      border: 1px solid #444;
      background: #2b2b2b;
      color: #fff;
    }
    button { cursor: pointer; background: #3b82f6; border: none; }
    button:disabled { background: #555; opacity: 0.6; cursor: not-allowed; }
    .btn-secondary { background: #6b7280; }

    .game-area {
      display: flex;
      gap: 8px;
      width: 100%;
      position: relative;
    }
    
    .eval-container {
      width: 24px;
      background: #333;
      border-radius: 4px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      border: 1px solid #555;
      position: relative;
    }
    .eval-white {
      background: #ffffff;
      width: 100%;
      height: 50%;
      transition: height 0.3s ease;
    }
    .eval-text {
      position: absolute;
      width: 100%;
      text-align: center;
      font-size: 0.65rem;
      font-weight: bold;
      color: #000;
      bottom: 2px;
      z-index: 2;
    }

    .board-wrapper {
      flex: 1;
      aspect-ratio: 1 / 1;
    }

    #board {
      width: 100%;
    }

    #status {
      margin-top: 0.5rem;
      font-weight: bold;
      text-align: center;
    }

    #review-mode-banner {
      display: none;
      background: #f59e0b;
      color: #000;
      font-weight: bold;
      text-align: center;
      padding: 4px;
      margin-top: 4px;
      border-radius: 4px;
      font-size: 0.8rem;
    }

    #analysis-panel {
      margin-top: 0.75rem;
      background: #2b2b2b;
      padding: 0.75rem;
      border-radius: 6px;
      display: none;
    }

    .summary-card {
      background: #1e1e1e;
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 8px;
    }
    .summary-stats {
      display: flex;
      justify-content: flex-start;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
      font-size: 0.75rem;
    }

    #analysis-list {
      max-height: 220px;
      overflow-y: auto;
    }

    .analysis-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px;
      border-bottom: 1px solid #333;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.15s;
    }
    .analysis-row:hover { background: #383838; }
    .analysis-row.active-review {
      background: #1e3a8a !important;
      border-left: 4px solid #3b82f6;
    }

    .badge {
      padding: 2px 6px;
      border-radius: 3px;
      font-weight: bold;
      font-size: 0.72rem;
    }
    .badge-best { background: #10b981; color: #fff; }
    .badge-good { background: #3b82f6; color: #fff; }
    .badge-inaccuracy { background: #f59e0b; color: #fff; }
    .badge-mistake { background: #f97316; color: #fff; }
    .badge-blunder { background: #ef4444; color: #fff; }
  </style>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
</head>
<body>

  <div class="container">
    <div class="controls">
      <div>
        <label for="game-mode">Mode:</label>
        <select id="game-mode">
          <option value="ai" selected>Player vs Stockfish</option>
          <option value="local">Local 2-Player (Flip Turn)</option>
        </select>
      </div>

      <div id="ai-difficulty-wrapper">
        <label for="difficulty">Difficulty:</label>
        <select id="difficulty">
          <option value="0">Beginner</option>
          <option value="5">Casual</option>
          <option value="10">Intermediate</option>
          <option value="15">Advanced</option>
          <option value="20" selected>Master</option>
        </select>
      </div>

      <button id="reset-btn">New Game</button>
    </div>

    <div class="toggles">
      <label><input type="checkbox" id="toggle-eval" checked> Live Evaluation Bar</label>
      <button id="analyze-btn">Analyze Game</button>
      <button id="current-pos-btn" class="btn-secondary" disabled>Current Position</button>
    </div>

    <div id="review-mode-banner">Review Mode Active (Read Only)</div>

    <div class="game-area">
      <div class="eval-container" id="eval-container">
        <div class="eval-white" id="eval-white"></div>
        <div class="eval-text" id="eval-text">0.0</div>
      </div>
      
      <div class="board-wrapper">
        <div id="board"></div>
      </div>
    </div>

    <div id="status">Loading Stockfish...</div>

    <div id="analysis-panel">
      <div class="summary-card">
        <div><strong>Overall Accuracy:</strong> <span id="accuracy-score">0%</span></div>
        <div class="summary-stats" id="summary-stats"></div>
      </div>
      <strong>Step-by-Step Review (Click move to jump):</strong>
      <div id="analysis-list"></div>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .catch(err => console.error('ServiceWorker registration failed: ', err));
      });
    }
  </script>

  <script>
    let board = null;
    const game = new Chess();
    let engineWorker = null;
    let isThinking = false;
    let evaluatingLive = false;
    let engineReady = false;
    let isAnalyzing = false;
    let isReviewing = false;
    let currentDepth = 0;
    let moveHistoryFens = [];

    // --- Native Board Orientation Sync ---
    function updateBoardOrientation() {
      if (!board) return;
      const isLocal = $('#game-mode').val() === 'local';
      
      if (isLocal && game.turn() === 'b' && !isReviewing) {
        board.orientation('black');
      } else {
        board.orientation('white');
      }
    }

    // --- Chessboard.js Drag & Drop Handlers ---
    function onDragStart (source, piece, position, orientation) {
      if (game.game_over() || isReviewing || isThinking || isAnalyzing || !engineReady) return false;

      const isLocal = $('#game-mode').val() === 'local';
      if (!isLocal) {
        if (piece.search(/^b/) !== -1) return false;
      }

      if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
          (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
        return false;
      }
    }

    function onDrop (source, target) {
      const move = game.move({
        from: source,
        to: target,
        promotion: 'q'
      });

      if (move === null) return 'snapback';

      updateStatus();

      const isLocal = $('#game-mode').val() === 'local';
      if (!isLocal && !game.game_over()) {
        triggerEngineMove();
      }
    }

    function onSnapEnd () {
      board.position(game.fen());
    }

    // --- Board & UI Setup ---
    function initBoard() {
      const config = {
        draggable: true,
        position: 'start',
        onDragStart: onDragStart,
        onDrop: onDrop,
        onSnapEnd: onSnapEnd,
        pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
      };
      board = Chessboard('board', config);
      $(window).resize(board.resize);
    }

    function updateStatus() {
      let status = '';
      let moveColor = game.turn() === 'b' ? 'Black' : 'White';
      const isLocal = $('#game-mode').val() === 'local';

      updateBoardOrientation();

      if (isReviewing) {
        $('#review-mode-banner').show();
        $('#status').text("Reviewing position history...");
        return;
      }

      $('#review-mode-banner').hide();

      if (game.in_checkmate()) {
        status = `Game over, ${moveColor} is in checkmate.`;
      } else if (game.in_draw()) {
        status = 'Game over, drawn position.';
      } else if (isThinking) {
        const depthText = currentDepth > 0 ? ` (Depth ${currentDepth})` : '';
        status = `Stockfish is thinking...${depthText}`;
      } else {
        if (isLocal) {
          status = `${moveColor}'s turn to move.`;
        } else {
          status = game.turn() === 'w' ? 'Your turn (White)' : "Stockfish's turn (Black)";
        }

        if (game.in_check()) {
          status += `, ${moveColor} is in check!`;
        }

        if (currentDepth > 0 && $('#toggle-eval').is(':checked')) {
          status += ` | Depth ${currentDepth}`;
        }
      }

      $('#status').text(status);
      requestLiveEval();
    }

    // --- Safe UCI Worker Helper ---
    function waitForReady() {
      return new Promise((resolve) => {
        if (!engineWorker) return resolve();
        
        function onReadyMessage(e) {
          const line = typeof e.data === 'string' ? e.data : '';
          if (line === 'readyok') {
            engineWorker.removeEventListener('message', onReadyMessage);
            resolve();
          }
        }
        engineWorker.addEventListener('message', onReadyMessage);
        engineWorker.postMessage('isready');
      });
    }

    // --- Engine Integration ---
    function initEngine() {
      if (engineWorker) {
        engineWorker.terminate();
      }

      try {
        engineWorker = new Worker('./stockfish-18-lite-single.js');

        engineWorker.onmessage = function (e) {
          const line = typeof e.data === 'string' ? e.data : '';

          if (line === 'uciok' || line === 'readyok') {
            engineReady = true;
            updateStatus();
          }

          if (line.includes('info depth ')) {
            const depthMatch = line.match(/info depth (\d+)/);
            if (depthMatch) {
              currentDepth = parseInt(depthMatch[1], 10);
              if (isThinking) {
                const depthText = currentDepth > 0 ? ` (Depth ${currentDepth})` : '';
                $('#status').text(`Stockfish is thinking...${depthText}`);
              }
            }
          }

          if (line.includes('score cp') || line.includes('score mate')) {
            parseEvalLine(line);
          }

          if (line.startsWith('bestmove')) {
            if (evaluatingLive) {
              evaluatingLive = false;
              return;
            }

            if (isThinking && !isAnalyzing && !isReviewing) {
              const moveStr = line.split(' ')[1];
              if (moveStr && moveStr !== '(none)') {
                game.move({
                  from: moveStr.substring(0, 2),
                  to: moveStr.substring(2, 4),
                  promotion: moveStr[4] || 'q'
                });
                board.position(game.fen());
              }
              isThinking = false;
              updateStatus();
            }
          }
        };

        engineWorker.postMessage('uci');
        engineWorker.postMessage('isready');
        setDifficulty();
      } catch (err) {
        console.error("Local Stockfish 18 initialization failed:", err);
        $('#status').text("Failed to load local Stockfish 18 engine.");
      }
    }

    async function triggerEngineMove() {
      if (!engineWorker || !engineReady || isThinking || isAnalyzing) return;
      
      isThinking = true;
      evaluatingLive = false;
      currentDepth = 0;
      updateStatus();

      engineWorker.postMessage('stop');
      await waitForReady();

      engineWorker.postMessage('position fen ' + game.fen());
      engineWorker.postMessage('go movetime 1200');
    }

    function setDifficulty() {
      if (!engineWorker) return;
      const level = $('#difficulty').val();
      engineWorker.postMessage(`setoption name Skill Level value ${level}`);
    }

    function parseEvalLine(line) {
      if (!$('#toggle-eval').is(':checked') || isAnalyzing || isReviewing) return;

      const tokens = line.split(' ');
      const cpIndex = tokens.indexOf('cp');
      const mateIndex = tokens.indexOf('mate');

      if (cpIndex !== -1) {
        let cp = parseInt(tokens[cpIndex + 1], 10);
        if (game.turn() === 'b') cp = -cp;
        updateEvalBar(cp);
      } else if (mateIndex !== -1) {
        let mate = parseInt(tokens[mateIndex + 1], 10);
        if (game.turn() === 'b') mate = -mate;
        updateEvalBar(0, true, mate);
      }
    }

    function updateEvalBar(scoreCp, isMate = false, mateIn = 0) {
      let evalDisplay = "";
      let percentage = 50;

      if (isMate) {
        evalDisplay = `M${Math.abs(mateIn)}`;
        percentage = mateIn > 0 ? 100 : 0;
      } else {
        const evalVal = (scoreCp / 100).toFixed(1);
        evalDisplay = scoreCp > 0 ? `+${evalVal}` : evalVal;
        
        const clampedCp = Math.max(-1000, Math.min(1000, scoreCp));
        percentage = 50 + (clampedCp / 20);
      }

      $('#eval-white').css('height', `${percentage}%`);
      $('#eval-text').text(evalDisplay);
    }

    async function requestLiveEval() {
      if (!engineWorker || !engineReady || isThinking || isAnalyzing || isReviewing) return;
      if (!$('#toggle-eval').is(':checked')) return;

      evaluatingLive = true;
      engineWorker.postMessage('stop');
      await waitForReady();

      engineWorker.postMessage(`position fen ${game.fen()}`);
      engineWorker.postMessage('go depth 10');
    }

    // --- Full Game Analysis Feature ---
    async function analyzeGame() {
      const history = game.history({ verbose: true });
      if (history.length === 0) {
        alert("Play a few moves first before analyzing!");
        return;
      }

      isAnalyzing = true;
      evaluatingLive = false;
      $('#analyze-btn').prop('disabled', true).text("Analyzing...");
      $('#status').text("Analyzing game moves...");
      $('#analysis-panel').show();
      $('#analysis-list').empty();

      engineWorker.postMessage('stop');
      await waitForReady();
      engineWorker.postMessage('ucinewgame');
      await waitForReady();

      const tempGame = new Chess();
      moveHistoryFens = [tempGame.fen()];
      const evaluations = [];

      evaluations.push(await evaluateFen(tempGame.fen()));

      for (let i = 0; i < history.length; i++) {
        tempGame.move(history[i]);
        moveHistoryFens.push(tempGame.fen());
        const evalScore = await evaluateFen(tempGame.fen());
        evaluations.push(evalScore);
        $('#status').text(`Analyzing move ${i + 1} of ${history.length}...`);
      }

      let totalAcc = 0;
      let stats = { Best: 0, Good: 0, Inaccuracy: 0, Mistake: 0, Blunder: 0 };

      for (let i = 0; i < history.length; i++) {
        const prevEval = evaluations[i];
        const currEval = evaluations[i + 1];
        const move = history[i];

        let evalDiff = (move.color === 'w') ? (prevEval - currEval) : (currEval - prevEval);
        evalDiff = Math.max(0, evalDiff);

        let badgeClass = 'badge-good';
        let category = 'Good';

        if (evalDiff < 15) { badgeClass = 'badge-best'; category = 'Best'; }
        else if (evalDiff < 50) { badgeClass = 'badge-good'; category = 'Good'; }
        else if (evalDiff < 120) { badgeClass = 'badge-inaccuracy'; category = 'Inaccuracy'; }
        else if (evalDiff < 250) { badgeClass = 'badge-mistake'; category = 'Mistake'; }
        else { badgeClass = 'badge-blunder'; category = 'Blunder'; }

        stats[category]++;

        const moveAcc = Math.max(0, 100 - (evalDiff / 3));
        totalAcc += moveAcc;

        const rowHtml = `
          <div class="analysis-row" data-index="${i + 1}">
            <div><strong>${i + 1}. ${move.san}</strong> (${move.color === 'w' ? 'White' : 'Black'})</div>
            <span class="badge ${badgeClass}">${category}</span>
          </div>
        `;
        $('#analysis-list').append(rowHtml);
      }

      const overallAccuracy = Math.round(totalAcc / history.length);
      $('#accuracy-score').text(`${overallAccuracy}%`);
      $('#summary-stats').html(`
        <span class="badge badge-best">Best: ${stats.Best}</span>
        <span class="badge badge-good">Good: ${stats.Good}</span>
        <span class="badge badge-inaccuracy">Inacc: ${stats.Inaccuracy}</span>
        <span class="badge badge-mistake">Mistakes: ${stats.Mistake}</span>
        <span class="badge badge-blunder">Blunders: ${stats.Blunder}</span>
      `);

      isAnalyzing = false;
      $('#analyze-btn').prop('disabled', false).text("Analyze Game");
      updateStatus();
    }

    function evaluateFen(fen) {
      return new Promise(async (resolve) => {
        await waitForReady();

        let lastScore = 0;
        function onEvalMessage(e) {
          const line = typeof e.data === 'string' ? e.data : '';

          if (line.includes('score cp')) {
            const tokens = line.split(' ');
            const cpIndex = tokens.indexOf('cp');
            if (cpIndex !== -1) {
              lastScore = parseInt(tokens[cpIndex + 1], 10);
            }
          } else if (line.includes('score mate')) {
            const tokens = line.split(' ');
            const mateIndex = tokens.indexOf('mate');
            if (mateIndex !== -1) {
              const mateIn = parseInt(tokens[mateIndex + 1], 10);
              lastScore = mateIn > 0 ? 10000 : -10000;
            }
          }

          if (line.startsWith('bestmove')) {
            engineWorker.removeEventListener('message', onEvalMessage);
            resolve(lastScore);
          }
        }

        engineWorker.addEventListener('message', onEvalMessage);
        engineWorker.postMessage(`position fen ${fen}`);
        engineWorker.postMessage('go depth 6');
      });
    }

    // --- Event Listeners ---
    $('#analyze-btn').on('click', analyzeGame);

    $(document).on('click', '.analysis-row', function() {
      const idx = $(this).data('index');
      if (moveHistoryFens[idx]) {
        isReviewing = true;
        board.position(moveHistoryFens[idx]);
        $('.analysis-row').removeClass('active-review');
        $(this).addClass('active-review');
        $('#current-pos-btn').prop('disabled', false);
        updateStatus();
      }
    });

    $('#reset-btn').on('click', () => {
      game.reset();
      board.position('start');
      isThinking = false;
      isAnalyzing = false;
      isReviewing = false;
      evaluatingLive = false;
      currentDepth = 0;
      $('#analysis-panel').hide();
      $('#current-pos-btn').prop('disabled', true);
      updateEvalBar(0);
      initEngine();
    });

    $('#game-mode').on('change', function () {
      const isLocal = $(this).val() === 'local';
      $('#ai-difficulty-wrapper').toggle(!isLocal);
      updateStatus();
    });

    $('#difficulty').on('change', setDifficulty);

    $('#toggle-eval').on('change', function () {
      $('#eval-container').toggle($(this).is(':checked'));
      requestLiveEval();
    });

    $('#current-pos-btn').on('click', () => {
      isReviewing = false;
      $('#current-pos-btn').prop('disabled', true);
      $('.analysis-row').removeClass('active-review');
      board.position(game.fen());
      updateStatus();
    });

    // Initialize Page
    $(document).ready(() => {
      initBoard();
      initEngine();
    });
  </script>
</body>
</html>
